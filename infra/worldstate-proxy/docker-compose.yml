services:
  # VPN Instance 1
  vpn-1:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn-1
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./wireguard/vpn1:/config
      - /lib/modules:/lib/modules:ro
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
    ports:
      - "9081:8080"

  proxy-1:
    image: caddy:2-alpine
    container_name: proxy-1
    restart: unless-stopped
    network_mode: "service:vpn-1"
    volumes:
      - ./Caddyfile-proxy:/etc/caddy/Caddyfile
    depends_on:
      - vpn-1
    environment:
      URL_TOKEN: "${URL_TOKEN:-}"

