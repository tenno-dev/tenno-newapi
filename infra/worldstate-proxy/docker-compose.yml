services:
  # VPN Instance 1
  vpn-1:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpn-1
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 1.0.0.1
      - 8.8.4.4
    volumes:
      - ./wireguard/vpn1:/config
      - /lib/modules:/lib/modules:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - MTU=1300
    ports:
      - "9081:8080"

  proxy-1:
    build: .
    container_name: proxy-1
    restart: unless-stopped
    network_mode: "service:vpn-1"
    depends_on:
      - vpn-1
    environment:
      URL_TOKEN: "${URL_TOKEN:-}"

